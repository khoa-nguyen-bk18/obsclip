<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsclip Settings</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="settings">
      <h1>Obsclip Settings</h1>

      <form id="settings-form">
        <fieldset>
          <legend>Vault</legend>
          <label class="field">
            <span>Vault path</span>
            <div class="row">
              <input
                id="vault-path"
                type="text"
                placeholder="Uses Obsidian default when empty"
                autocomplete="off"
              />
              <button type="button" id="browse-vault">Browse</button>
            </div>
          </label>
          <label class="checkbox">
            <input type="checkbox" id="use-obsidian-default" />
            Use Obsidian default
          </label>
        </fieldset>

        <fieldset>
          <legend>Global shortcut</legend>
          <label class="field">
            <span>Shortcut</span>
            <input
              id="shortcut"
              type="text"
              placeholder="CommandOrControl+Shift+KeyV"
              autocomplete="off"
            />
          </label>
          <p class="hint">Tauri format (e.g. CommandOrControl+Shift+KeyV). Save to apply.</p>
        </fieldset>

        <fieldset>
          <legend>Text format</legend>
          <label class="field">
            <span>Format</span>
            <select id="text-format">
              <option value="timestamped">Timestamped</option>
              <option value="blockquote">Blockquote</option>
              <option value="bullet">Bullet</option>
              <option value="checkbox">Checkbox</option>
            </select>
          </label>
        </fieldset>

        <div class="actions">
          <button type="submit" id="save-btn">Save</button>
          <p id="status" class="status" aria-live="polite"></p>
        </div>
      </form>
    </main>
  </body>
</html>
