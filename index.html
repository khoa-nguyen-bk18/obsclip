<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obsclip Settings</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <main class="settings">
      <h1>Obsclip Settings</h1>

      <form id="settings-form">
        <fieldset>
          <legend>Vault</legend>
          <label class="field">
            <span>Vault path</span>
            <div class="row">
              <input
                id="vault-path"
                type="text"
                readonly
                placeholder="Using Obsidian default"
                autocomplete="off"
              />
              <button type="button" id="change-vault">Change…</button>
            </div>
          </label>
          <label class="checkbox">
            <input type="checkbox" id="use-obsidian-default" />
            Use Obsidian default
          </label>
        </fieldset>

        <fieldset>
          <legend>Global shortcut</legend>
          <div class="shortcut-fields">
            <label class="field">
              <span>Modifier</span>
              <select id="shortcut-primary">
                <option value="CommandOrControl">⌘ Command / Ctrl</option>
                <option value="Alt">⌥ Option / Alt</option>
                <option value="None">None</option>
              </select>
            </label>
            <label class="field">
              <span>Extra</span>
              <select id="shortcut-secondary">
                <option value="None">None</option>
                <option value="Shift">⇧ Shift</option>
                <option value="Alt">⌥ Option / Alt</option>
              </select>
            </label>
            <label class="field">
              <span>Key</span>
              <select id="shortcut-key"></select>
            </label>
          </div>
          <p class="hint">
            Preview: <kbd id="shortcut-preview">⌘⇧V</kbd>
          </p>
        </fieldset>

        <fieldset>
          <legend>Clip</legend>
          <label class="checkbox">
            <input type="checkbox" id="annotation-prompt" checked />
            Prompt to add a note before clipping
          </label>
          <p class="hint">
            When enabled, a dialog shows the clip preview and lets you add an
            optional note. Press ⌘↵ or Ctrl+↵ to clip; Esc cancels without
            appending.
          </p>
        </fieldset>

        <fieldset>
          <legend>Text format</legend>
          <label class="field">
            <span>Format</span>
            <select id="text-format">
              <option value="timestamped">Timestamped</option>
              <option value="blockquote">Blockquote</option>
              <option value="bullet">Bullet</option>
              <option value="checkbox">Checkbox</option>
            </select>
          </label>
        </fieldset>

        <div class="actions">
          <p id="status" class="status" aria-live="polite"></p>
        </div>
      </form>
    </main>
  </body>
</html>
