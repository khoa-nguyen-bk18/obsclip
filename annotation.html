<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/annotation.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add note</title>
    <script type="module" src="/src/annotation.ts" defer></script>
