name: ci

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run shellcheck
        uses: koalaman/shellcheck-action@v0.9
        with:
          scandir: scripts
          severity: error
